<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>D&D NPC Generator</title>
<style>
  :root{
    --parchment:#f4e8d0;
    --parchment-dark:#e8d9b5;
    --ink:#2b1d10;
    --maroon:#6b1f24;
    --maroon-dark:#4d1519;
    --gold:#b8860b;
    --line:#c9b184;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: 'Georgia', 'Times New Roman', serif;
    background: radial-gradient(circle at top, #3a2c22, #1c140d 70%);
    color:var(--ink);
    padding:24px 12px 60px;
    min-height:100vh;
  }
  .sheet{
    max-width:820px;
    margin:0 auto;
    background:var(--parchment);
    border:3px solid var(--maroon-dark);
    border-radius:8px;
    box-shadow:0 0 0 6px var(--parchment-dark), 0 20px 50px rgba(0,0,0,0.6);
    padding:28px 32px 34px;
  }
  h1{
    text-align:center;
    font-size:1.9em;
    letter-spacing:1px;
    color:var(--maroon-dark);
    margin:0 0 4px;
    text-shadow:1px 1px 0 rgba(255,255,255,0.3);
  }
  .subtitle{
    text-align:center;
    font-style:italic;
    color:#5a4630;
    margin:0 0 20px;
    font-size:0.95em;
  }
  .controls{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:22px;
  }
  button{
    font-family:inherit;
    cursor:pointer;
    border-radius:5px;
    border:1px solid var(--maroon-dark);
    background:var(--maroon);
    color:#f4e8d0;
    padding:10px 18px;
    font-size:0.95em;
    transition:transform .08s ease, background .15s ease;
  }
  button:hover{ background:var(--maroon-dark); }
  button:active{ transform:scale(0.96); }
  button.secondary{
    background:var(--parchment-dark);
    color:var(--ink);
    border:1px solid var(--line);
  }
  button.secondary:hover{ background:#dcc99a; }
  .filters{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
    flex-wrap:wrap;
    font-size:0.9em;
  }
  select{
    font-family:inherit;
    padding:6px 8px;
    border-radius:4px;
    border:1px solid var(--line);
    background:#fffdf7;
  }
  .name-banner{
    text-align:center;
    margin-bottom:6px;
  }
  .name-banner .name{
    font-size:1.6em;
    font-weight:bold;
    color:var(--maroon-dark);
  }
  .name-banner .tagline{
    font-style:italic;
    color:#5a4630;
    font-size:1.05em;
    margin-top:2px;
  }
  hr{
    border:none;
    border-top:2px solid var(--line);
    margin:18px 0;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px 22px;
  }
  @media (max-width:600px){
    .grid{ grid-template-columns:1fr; }
    .sheet{ padding:20px 18px 28px; }
  }
  .field{
    background:rgba(255,255,255,0.35);
    border:1px solid var(--line);
    border-radius:6px;
    padding:10px 12px;
    position:relative;
  }
  .field label{
    display:block;
    text-transform:uppercase;
    letter-spacing:1px;
    font-size:0.7em;
    color:var(--maroon-dark);
    font-weight:bold;
    margin-bottom:4px;
  }
  .field .value{
    font-size:1.05em;
    line-height:1.3;
  }
  .field .reroll{
    position:absolute;
    top:8px;
    right:8px;
    background:none;
    border:none;
    color:var(--maroon);
    font-size:1.1em;
    padding:2px 5px;
    line-height:1;
  }
  .field .reroll:hover{ color:var(--maroon-dark); transform:none; background:none;}
  .field.locked{ box-shadow:inset 0 0 0 2px var(--gold); }
  .quirk-box{
    grid-column:1/-1;
    background:#fbf2d8;
    border:1px dashed var(--gold);
  }
  .quirk-box .value{
    font-size:1.25em;
    font-weight:bold;
    color:var(--maroon-dark);
  }
  .full{
    grid-column:1/-1;
  }
  footer{
    text-align:center;
    color:#8a7a5c;
    font-size:0.8em;
    margin-top:22px;
  }
  .copy-msg{
    text-align:center;
    font-size:0.85em;
    color:var(--maroon-dark);
    min-height:18px;
    margin-top:6px;
  }
</style>
</head>
<body>
<div class="sheet">
  <h1>&#9876; NPC Forge &#9876;</h1>
  <p class="subtitle">An extensive random NPC generator for D&amp;D 5e &mdash; expanded species &amp; two-word quirks</p>

  <div class="filters">
    <label for="speciesFilter">Species:</label>
    <select id="speciesFilter"></select>
  </div>

  <div class="controls">
    <button id="genBtn">&#127922; Generate NPC</button>
    <button id="copyBtn" class="secondary">&#128203; Copy to clipboard</button>
    <button id="clearLocksBtn" class="secondary">&#128275; Clear locks</button>
  </div>

  <div class="name-banner">
    <div class="name" id="npcName">Click Generate</div>
    <div class="tagline" id="npcTagline"></div>
  </div>

  <hr>

  <div class="grid">
    <div class="field quirk-box" data-key="quirk">
      <label>Defining Quirk</label>
      <div class="value" id="f-quirk">&mdash;</div>
      <button class="reroll" title="lock/reroll">&#127922;</button>
    </div>

    <div class="field" data-key="species">
      <label>Species</label>
      <div class="value" id="f-species">&mdash;</div>
      <button class="reroll" title="lock/reroll">&#127922;</button>
    </div>
    <div class="field" data-key="gender">
      <label>Gender</label>
      <div class="value" id="f-gender">&mdash;</div>
      <button class="reroll" title="lock/reroll">&#127922;</button>
    </div>
    <div class="field" data-key="occupation">
      <label>Occupation</label>
      <div class="value" id="f-occupation">&mdash;</div>
      <button class="reroll" title="lock/reroll">&#127922;</button>
    </div>
    <div class="field" data-key="alignment">
      <label>Alignment</label>
      <div class="value" id="f-alignment">&mdash;</div>
      <button class="reroll" title="lock/reroll">&#127922;</button>
    </div>
    <div class="field" data-key="trait">
      <label>Personality Trait</label>
      <div class="value" id="f-trait">&mdash;</div>
      <button class="reroll" title="lock/reroll">&#127922;</button>
    </div>
    <div class="field" data-key="voice">
      <label>Voice / Mannerism</label>
      <div class="value" id="f-voice">&mdash;</div>
      <button class="reroll" title="lock/reroll">&#127922;</button>
    </div>
    <div class="field" data-key="bond">
      <label>Bond</label>
      <div class="value" id="f-bond">&mdash;</div>
      <button class="reroll" title="lock/reroll">&#127922;</button>
    </div>
    <div class="field" data-key="flaw">
      <label>Flaw</label>
      <div class="value" id="f-flaw">&mdash;</div>
      <button class="reroll" title="lock/reroll">&#127922;</button>
    </div>
    <div class="field full" data-key="secret">
      <label>Secret / Hook</label>
      <div class="value" id="f-secret">&mdash;</div>
      <button class="reroll" title="lock/reroll">&#127922;</button>
    </div>
  </div>

  <div class="copy-msg" id="copyMsg"></div>
  <footer>Click a field's &#127922; to reroll just that field. Shift-click (or right-click) to lock/unlock a field so Generate leaves it alone.</footer>
</div>

function pickWeighted(weightMap){
  const entries = Object.entries(weightMap);
  const total = entries.reduce((sum,[,w])=>sum+w, 0);
  let roll = Math.random()*total;
  for(const [value,w] of entries){
    if(roll < w) return value;
    roll -= w;
  }
  return entries[entries.length-1][0];
}

(function seedSillyNames(){
  function seedInto(g, i){
    const a = SILLY_NAMES[i % SILLY_NAMES.length];
    const b = SILLY_NAMES[(i + 3) % SILLY_NAMES.length];
    if(g.male) g.male.push(a);
    if(g.female) g.female.push(b);
    if(g.neutral && g.neutral.length) g.neutral.push(SILLY_NAMES[(i + 7) % SILLY_NAMES.length]);
  }
  const groupKeys = Object.keys(NAME_GROUPS);
  groupKeys.forEach((key, i)=>{
    const g = NAME_GROUPS[key];
    if(g.cultures && g.cultures.length){
      g.cultures.forEach((culture, j)=> seedInto(culture, i + j));
    } else {
      seedInto(g, i);
    }
  });
})();

// ---------- STATE ----------
const state = {};
const locked = {};

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function genderKeyForName(g){
  if(g === "Male") return "male";
  if(g === "Female") return "female";
  return "neutral";
}

function generateName(gender, species){
  const key = genderKeyForName(gender);
  const groupKey = SPECIES_TO_GROUP[species] || "human";
  let group = NAME_GROUPS[groupKey] || NAME_GROUPS.human;
  // Some groups (e.g. Human) are split into real-world cultures — pick one first so the
  // first name and surname come from the same coherent culture instead of mixing at random.
  if(group.cultures && group.cultures.length){
    group = pick(group.cultures);
  }
  const pool = (group[key] && group[key].length) ? group[key] : ((group.neutral && group.neutral.length) ? group.neutral : group.male);
  const first = pick(pool);
  if(group.surnames && group.surnames.length){
    return `${first} ${pick(group.surnames)}`;
  }
  return first;
}

function populateSpeciesFilter(){
  const sel = document.getElementById("speciesFilter");
  const land = SPECIES.filter(s => !AQUATIC_SPECIES.includes(s));
  sel.innerHTML = '<option value="__any__">Any species</option>' +
    land.map(s => `<option value="${s}">${s}</option>`).join("") +
    '<optgroup label="Aquatic">' +
    AQUATIC_SPECIES.map(s => `<option value="${s}">${s}</option>`).join("") +
    '</optgroup>';
}

function rollField(key){
  switch(key){
    case "species": {
      const filt = document.getElementById("speciesFilter").value;
      return (filt && filt !== "__any__") ? filt : pick(SPECIES);
    }
    case "gender": return pickWeighted(GENDER_WEIGHTS);
    case "occupation": return pick(OCCUPATIONS);
    case "alignment": return pick(ALIGNMENTS);
    case "trait": return pick(TRAITS);
    case "quirk": return pick(QUIRKS);
    case "voice": return pick(VOICES);
    case "bond": return pick(BONDS);
    case "flaw": return pick(FLAWS);
    case "secret": return pick(SECRETS);
  }
}

const FIELD_KEYS = ["species","gender","occupation","alignment","trait","quirk","voice","bond","flaw","secret"];

// If the current species is Triton, (re)roll its cosmetic variety tag; otherwise clear it.
function updateTritonVariety(){
  if(state.species === "Triton"){
    state.speciesVariety = pick(TRITON_VARIETIES);
  } else {
    state.speciesVariety = null;
  }
}

function displaySpecies(){
  if(!state.species) return "—";
  return state.speciesVariety ? `${state.species} (${state.speciesVariety})` : state.species;
}

function render(){
  FIELD_KEYS.forEach(k=>{
    document.getElementById("f-"+k).textContent = (k === "species") ? displaySpecies() : (state[k] || "—");
    const box = document.querySelector(`.field[data-key="${k}"]`);
    box.classList.toggle("locked", !!locked[k]);
  });
  document.getElementById("npcName").textContent = state.name || "Click Generate";
  document.getElementById("npcTagline").textContent =
    (state.species && state.occupation) ? `${displaySpecies()} ${state.occupation}` : "";
}

function generate(){
  FIELD_KEYS.forEach(k=>{
    if(!locked[k]) state[k] = rollField(k);
  });
  if(!locked["species"]){
    updateTritonVariety();
  } else if(state.speciesVariety === undefined){
    updateTritonVariety();
  }
  if(!locked["name"] || !state.name){
    state.name = generateName(state.gender, state.species);
  }
  render();
  document.getElementById("copyMsg").textContent = "";
}

function toggleLock(key){
  locked[key] = !locked[key];
  render();
}

function buildText(){
  return [
    `Name: ${state.name}`,
    `Species: ${displaySpecies()}`,
    `Gender: ${state.gender}`,
    `Occupation: ${state.occupation}`,
    `Alignment: ${state.alignment}`,
    `Quirk: ${state.quirk}`,
    `Personality Trait: ${state.trait}`,
    `Voice/Mannerism: ${state.voice}`,
    `Bond: ${state.bond}`,
    `Flaw: ${state.flaw}`,
    `Secret/Hook: ${state.secret}`
  ].join("\n");
}

// ---------- INIT ----------
populateSpeciesFilter();

document.getElementById("genBtn").addEventListener("click", generate);
document.getElementById("clearLocksBtn").addEventListener("click", ()=>{
  Object.keys(locked).forEach(k=>locked[k]=false);
  render();
});
document.getElementById("copyBtn").addEventListener("click", ()=>{
  const text = buildText();
  navigator.clipboard.writeText(text).then(()=>{
    document.getElementById("copyMsg").textContent = "Copied to clipboard!";
  }).catch(()=>{
    document.getElementById("copyMsg").textContent = text;
  });
});

document.querySelectorAll(".field .reroll").forEach(btn=>{
  btn.addEventListener("click", (e)=>{
    const box = e.target.closest(".field");
    const key = box.dataset.key;
    // shift-click (or long tap) toggles lock; plain click rerolls single field
    if(e.shiftKey){
      toggleLock(key);
    } else {
      if(!locked[key]){
        state[key] = rollField(key);
        if(key === "species"){
          updateTritonVariety();
        }
        if(key === "species" || key === "gender"){
          if(!locked["name"]) state.name = generateName(state.gender, state.species);
        }
        render();
      }
    }
  });
  btn.addEventListener("contextmenu", (e)=>{
    e.preventDefault();
    const box = e.target.closest(".field");
    toggleLock(box.dataset.key);
  });
});

generate();
